<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto+Slab:wght@100..900&display=swap');

        * {
            box-sizing: border-box
        }

        .incorrect {
            background-color: #db2828;
        }

        #todoContainer,
        #completedContainer {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 1fr 5fr;

        }

        #todoUl,
        #completedUl {
            display: flex;
            overflow-x: scroll;
            gap: 0.5rem;
        }

        body {
            font-family: 'Roboto mono', monospace;
            overflow-x: hidden;
        }

        #todoUl li,
        #completedUl li {
            display: grid;
            grid-template-rows: auto 1fr 3fr 1fr;
            height: 40vh;
            gap: 1rem;
        }

        #todosContainer.show {
            display: block;
            padding: 0.25rem;
        }

        #goalContainer.show {
            display: grid;
            grid-template-rows: 7fr 2fr;
        }

        #todosContainer {
            display: none;
        }

        #goalContainer {
            display: none;
        }

        #goalMenu {
            display: none;
            padding: 1rem;
            max-width: 50vw;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid #444;
            border-radius: 1rem;
            box-shadow: 1px 1px 0 #444;
        }

        #goalMenu input,
        #goalMenu button {
            border: 1px solid #444;
            padding: 0.25rem;
            border-radius: 5rem;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'roboto slab', serif;
        }

        #goal {
            font-size: 3em;
            text-align: center;
        }

        button {
            background-color: #a5b9e8;
            border-radius: 0.5rem;
            padding: 0.5rem 1rem;
            border: 1px solid #444;
            box-shadow: 1px 1px 0 #444;
            transition: all 0.25s;
        }

        button:hover {
            transform: scale(105%);
            background-color: #859ac6;
            color: white;
        }

        #goalMenu.show {
            display: flex;
            gap: 0.5rem;
            flex-direction: column;
            font-size: 3em;
            background-color: #ddd;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-around;
            font-family: 'roboto slab', serif;
        }

        #menu {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .inpgroup {
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 1rem;
            position: sticky;
            bottom: 1rem;
        }

        .inpgroup input {
            border-radius: 0.5rem;

        }

        input,
        select,
        textarea {
            border-radius: 0.5rem;
            padding: 0.5rem 1rem;
            border: 1px solid #444;
            box-shadow: 1px 1px 0 #444;
        }
    </style>
</head>

<body>
    <header>
        <h1 id="greetings"></h1>
        <p id="time"></p>
    </header>



    <div id="namecontainer">
        <label for="nameInp">What is your dev name?</label><input type="text" name="nameInp" id="nameInp">
        <button>Submit name</button>
    </div>
    <hr>
    <div id="menu">
        <button onclick="openTodos()">Todos</button><button onclick="openGoal()">Daily goal</button>
    </div>
    <hr>
    <div id="menuItemContainer">
        <div id="todosContainer" class="show">

            <button onclick="resetTodos()">New list</button>
            <div id="todoContainer">
                <h3>TODO:</h3>
                <ul id="todoUl"></ul>
            </div>
            <div id="completedContainer">
                <h3>Completed</h3>
                <ul id="completedUl"></ul>
            </div>
            <div class="inpgroup">
                <input type="number"><button onclick="deleteTodo(this)">delete</button>
            </div>
        </div>
        <div id="goalContainer">
            <h3 id="goal"></h3>
            <button onclick="openMenu(this)">new goal</button>
            <div id="goalMenu">
                <input type="text" id="goalNameInp">
                <button id="setGoal">Set</button>
            </div>
        </div>
    </div>
    <script src="timeHandler.js"></script>
    <script>
        const goalMenu = document.getElementById('goalMenu');
        const goalH3 = document.getElementById('goal');
        const button = document.getElementById('setGoal');
        function setCookie(cname, cvalue, exdays) {
            const d = new Date();
            d.setTime(d.getTime() + (exdays * 24 * 60 * 60 * 1000));
            let expires = "expires=" + d.toUTCString();
            document.cookie = cname + "=" + cvalue + ";" + expires + ";path=/";
        }

        function getCookie(cname) {
            let name = cname + "=";
            let ca = document.cookie.split(';');
            for (let i = 0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) == ' ') {
                    c = c.substring(1);
                }
                if (c.indexOf(name) == 0) {
                    return c.substring(name.length, c.length);
                }
            }
            return "";
        }
        function deleteCookie(cname) {
            setCookie(cname, null, -1)
        }
        button.onclick = function () {
            let value = button.previousElementSibling.value;
            goalH3.innerText = value;
            setCookie("goal", value, 99)
        }
        window.onload = function () {
            let value = getCookie('goal');
            if (!value) {
                return;
            }
            goalH3.innerText = value;
        }
        function openMenu(btn) {
            btn.nextElementSibling.classList.toggle('show')
        }
    </script>
    <script src="nameHandler.js"></script>
    <script src="menuHandler.js"></script>
    <script src="todoHandler.js"></script>
</body>

</html>
